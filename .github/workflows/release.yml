name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            cgo: "1"
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
            cgo: "1"
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
            cgo: "0"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libgles2-mesa-dev \
            libvulkan-dev libxkbcommon-x11-dev libx11-xcb-dev libxcursor-dev \
            libxfixes-dev libegl-dev

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: go test -race -count=1 -timeout 120s ./internal/...

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        shell: bash
        run: |
          mkdir -p dist
          go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.tag }}" \
            -o dist/orus-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/orus/

      # Ad-hoc code sign macOS binaries with hardened runtime for Gatekeeper/Tahoe
      - name: Sign macOS binary
        if: runner.os == 'macOS'
        run: |
          codesign --force --options runtime --sign - dist/orus-${{ matrix.goos }}-${{ matrix.goarch }}
          codesign --verify --verbose dist/orus-${{ matrix.goos }}-${{ matrix.goarch }}

      # Create zip for macOS to preserve executable permissions and Gatekeeper metadata
      - name: Package macOS binary
        if: runner.os == 'macOS'
        run: |
          cd dist
          ditto -c -k --keepParent orus-${{ matrix.goos }}-${{ matrix.goarch }} orus-${{ matrix.goos }}-${{ matrix.goarch }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: orus-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/orus-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
            dist/orus-${{ matrix.goos }}-${{ matrix.goarch }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -lhR dist/

      - name: Create checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          prev_tag=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$prev_tag" ] || [ "$prev_tag" = "${{ steps.version.outputs.tag }}" ]; then
            echo "body=Initial release" >> "$GITHUB_OUTPUT"
          else
            changelog=$(git log --pretty=format:"- %s (%h)" "$prev_tag".."${{ steps.version.outputs.tag }}" 2>/dev/null || echo "Initial release")
            # Use a delimiter for multiline output
            {
              echo "body<<CHANGELOG_EOF"
              echo "$changelog"
              echo "CHANGELOG_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "🦉 Orus ${{ steps.version.outputs.tag }}"
          body: |
            ## 🦉 Orus ${{ steps.version.outputs.tag }}

            ### Changes
            ${{ steps.changelog.outputs.body }}

            ---

            ### 📥 Downloads

            | Platform | Architecture | File | Notes |
            |----------|-------------|------|-------|
            | 🍎 macOS | Intel (x86_64) | [`orus-darwin-amd64.zip`](https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/orus-darwin-amd64.zip) | Compatible macOS Tahoe+ |
            | 🍎 macOS | Apple Silicon (ARM64) | [`orus-darwin-arm64.zip`](https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/orus-darwin-arm64.zip) | Compatible macOS Tahoe+ |
            | 🐧 Linux | x86_64 | [`orus-linux-amd64`](https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/orus-linux-amd64) | |
            | 🪟 Windows | x86_64 | [`orus-windows-amd64.exe`](https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/orus-windows-amd64.exe) | |

            ---

            ### 🍎 Instructions macOS (Tahoe & versions récentes)

            Les binaires macOS sont signés ad-hoc avec le hardened runtime.
            Après le téléchargement, si macOS bloque l'exécution :

            1. **Décompressez** le fichier `.zip`
            2. Ouvrez le **Terminal** et exécutez :
               ```bash
               xattr -cr ~/Downloads/orus-darwin-amd64
               chmod +x ~/Downloads/orus-darwin-amd64
               ./orus-darwin-amd64
               ```
            3. Ou faites **clic droit → Ouvrir** sur le binaire dans le Finder

            > **Note :** Les fichiers `.zip` sont créés avec `ditto` pour préserver les attributs macOS.

            ---

            ### ✅ Vérification d'intégrité (SHA-256)
            Vérifiez l'intégrité de votre téléchargement :
            ```bash
            sha256sum -c checksums.txt
            ```
          files: |
            dist/orus-linux-amd64
            dist/orus-darwin-amd64
            dist/orus-darwin-amd64.zip
            dist/orus-darwin-arm64
            dist/orus-darwin-arm64.zip
            dist/orus-windows-amd64.exe
            dist/checksums.txt
          draft: false
          prerelease: false
